name: Fetch WC Results

on:
  schedule:
    # Slot 1 — afternoon kickoffs (16:00–19:00 UTC) → run at 21:30 UTC
    - cron: '30 21 * * *'
    # Slot 2 — evening kickoffs (20:00–23:30 UTC) → run at 02:30 UTC
    - cron: '30 2 * * *'
    # Slot 3 — late-night kickoffs (00:00–04:00 UTC) → run at 06:30 UTC
    - cron: '30 6 * * *'
  workflow_dispatch: # Also allows manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and score results
        run: node fetch-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
