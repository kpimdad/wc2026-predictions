name: Fetch WC Results

on:
  schedule:
    # Runs every 30 minutes during WC match hours (UTC).
    # Script fetches yesterday+today, skips already-scored matches, so
    # duplicate fires are harmless. Public repo = free unlimited minutes.
    # This ensures no match waits more than 30 min regardless of GitHub
    # Actions scheduling delays.

    # Every 30 min, 00:00–08:00 UTC (covers late-night/early-morning kickoffs)
    - cron: '0,30 0,1,2,3,4,5,6,7,8 * * *'
    # Every 30 min, 16:00–24:00 UTC (covers afternoon/evening kickoffs)
    - cron: '0,30 16,17,18,19,20,21,22,23 * * *'

  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch and score results
        run: node fetch-results.js
        working-directory: scripts
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
